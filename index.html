<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>lalasweet-agent</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('error', function(e) {
        document.body.innerHTML += '<div style="color:red;padding:20px;z-index:9999;position:absolute;top:0;left:0;background:white;"><strong>Unhandled Error:</strong> ' + e.message + '<br>' + e.filename + ':' + e.lineno + '</div>';
      });
      const ogErr = console.error;
      console.error = function(...args) {
        document.body.innerHTML += '<div style="color:red;padding:20px;z-index:9999;position:absolute;top:0;left:0;background:white;"><strong>Console Error:</strong> ' + args.join(' ') + '</div>';
        ogErr.apply(console, args);
      };
    </script>
  </body>
</html>
